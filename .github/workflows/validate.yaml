name: Validate - Manifests & Policies

on:
  pull_request:
    paths:
      - 'k8s/**'
      - 'infra/**'
      - 'Dockerfile'
      - 'main.go'
      - 'go.mod'

jobs:
  lint-go:
    name: "Go vet + build check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          cache: false
      - name: go vet
        run: go vet ./...
      - name: go build (dry run)
        run: CGO_ENABLED=0 go build -o /dev/null .

  kubeconform:
    name: "kubeconform - manifest schema validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install kubeconform
        run: |
          curl -sLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin/ kubeconform
          chmod +x /usr/local/bin/kubeconform
      - name: Validate k8s manifests
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -summary \
            k8s/base/**/*.yaml k8s/security/**/*.yaml k8s/argocd/*.yaml

  tf-fmt:
    name: "Terraform fmt check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.7.5"
      - name: terraform fmt -check
        run: terraform -chdir=infra fmt -check -recursive

  tf-validate:
    name: "Terraform validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.7.5"
      - name: terraform init (local backend for validation)
        run: |
          cd infra
          terraform init -backend=false
      - name: terraform validate
        run: terraform -chdir=infra validate
