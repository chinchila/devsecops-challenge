---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-3
  namespace: service-3
  annotations:
    iam.gke.io/gcp-service-account: WORKLOAD_SA_EMAIL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-3
  namespace: service-3
  labels:
    app: service-3
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-3
  template:
    metadata:
      labels:
        app: service-3
        version: v1
    spec:
      serviceAccountName: service-3
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: service-3
          image: ghcr.io/chinchila/devsecops-challenge@sha256:7b050117a8b024cf2ac4d935f9b5e25e0e2b5afeeb4d063675ef1fb95a9e9d2d
          env:
            - name: SERVICE
              value: "service-3"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
          ports:
            - containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: service-3
  namespace: service-3
  labels:
    app: service-3
spec:
  selector:
    app: service-3
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
