---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: service-1
spec:
  hard:
    # Compute
    requests.cpu: "200m"
    requests.memory: "128Mi"
    limits.cpu: "1000m"
    limits.memory: "512Mi"
    # cant use massive resources
    pods: "10"
    services: "5"
    secrets: "10"
    configmaps: "10"
    persistentvolumeclaims: "0"   # the app is stateless
