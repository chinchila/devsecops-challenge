---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: service-1
spec:
  limits:
    - type: Container
      default:          # if the container has no limits we put them
        cpu: "200m"
        memory: "128Mi"
      defaultRequest:   # if the container has no requests we put them
        cpu: "50m"
        memory: "32Mi"
      max:              # this is the max for a container to execute
        cpu: "500m"
        memory: "512Mi"
      min:
        cpu: "10m"
        memory: "16Mi"
    - type: Pod
      max:
        cpu: "1000m"
        memory: "1Gi"
