# Infisical Secrets Operator CRDs
# These sync secrets from Infisical → Kubernetes Secrets
# The JWT_SECRET value lives ONLY in Infisical - never in plaintext in this repo.
#
# Prerequisites:
#   1. Create a Machine Identity in Infisical with read access to the project
#   2. kubectl create secret generic infisical-machine-identity \
#        --from-literal=clientId=<ID> \
#        --from-literal=clientSecret=<SECRET> \
#        -n service-1 (repeat for service-2, service-3)

---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: app-secrets
  namespace: service-1
spec:
  hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
  syncConfig:
    resyncInterval: "60s"
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "devsecops-challenge"
        envSlug: "prod"
        secretsPath: "/"
        recursive: false
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: service-1
  managedKubeSecretReferences:
    - secretName: app-secrets
      secretNamespace: service-1
      creationPolicy: "Owner"
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: app-secrets
  namespace: service-2
spec:
  hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
