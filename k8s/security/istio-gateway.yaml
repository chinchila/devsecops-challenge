# k8s/security/istio-gateway.yaml
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: app-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: app-tls
      hosts:
        - "service-1.example.com"
        - "service-3.example.com"

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: service-1
  namespace: service-1
spec:
  hosts:
    - "service-1.example.com"
  gateways:
    - istio-system/app-gateway
  http:
    - match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: service-1.service-1.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure"

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: service-3
  namespace: service-3
spec:
  hosts:
    - "service-3.example.com"
  gateways:
    - istio-system/app-gateway
  http:
    - match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: service-3.service-3.svc.cluster.local
            port:
              number: 8080
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: "5xx,reset,connect-failure"

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: service-1-mtls
  namespace: service-1
spec:
  host: service-1.service-1.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: service-2-mtls
  namespace: service-2
spec:
  host: service-2.service-2.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s

---
apiVersion: networking.istio.io/v1beta1
