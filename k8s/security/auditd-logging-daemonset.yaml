# Source: https://github.com/GoogleCloudPlatform/k8s-node-tools/tree/master/os-audit
#
# Deploy: kubectl apply -f k8s/security/cos-auditd-logging.yaml
# Verify: kubectl get pods -n cos-auditd
---
apiVersion: v1
kind: Namespace
metadata:
  name: cos-auditd
  labels:
    # Auditd runs on node and needs privileged
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: auditd
spec:
  selector:
    matchLabels:
      name: auditd
  template:
    metadata:
      namespace: cos-auditd
      labels:
        name: auditd
    spec:
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      hostPID: true
      hostIPC: true

      containers:
        - name: auditd
          securityContext:
            privileged: true
            capabilities:
              add:
                - CAP_AUDIT_CONTROL
                - CAP_AUDIT_READ
                - CAP_AUDIT_WRITE
                - CAP_SYS_NICE
          image: ghcr.io/appvia/auditd-container@sha256:55d989385e70244d2235b61211426ae045c4febc90440fb317416adf95e2572b
          # args: ['sh', '-c', 'apk add --no-cache audit && auditd -n']
          volumeMounts:
          - mountPath: /var/log/audit
            name: auditlog
      volumes:
      - hostPath:
          path: /var/log/audit
          type: DirectoryOrCreate
        name: auditlog