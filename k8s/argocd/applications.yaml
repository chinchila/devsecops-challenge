---
# Security controls as an Argo CD app too (GitOps all the way)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-controls
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/chinchila/devsecops-challenge  # replace
    targetRevision: main
    path: k8s/security
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
