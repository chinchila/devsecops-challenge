framework:
  - terraform
  - kubernetes

soft-fail: false

skip-check:
  # GKE Binary Authorization
  # Justification: Requires attestor infrastructure not in scope.
  # Residual risk: R-02 in THREAT_MODEL.md. Mitigated by Cosign + Argo CD.
  - CKV_GCP_25

  # GKE Intranode visibility
  # Justification: ADVANCED_DATAPATH (eBPF/Cilium) provides equivalent visibility
  # without the performance overhead of intranode visibility mode.
  - CKV_GCP_61

  # GKE shielded nodes boot integrity monitoring on nodes
  # Justification: Already enabled via shielded_instance_config in gke/main.tf.
  # Checkov has a false positive for this check on Terraform google-beta provider.
  - CKV_GCP_68

  # Kubernetes: do not admit containers with added capabilities
  # Justification: Our containers drop ALL capabilities. This check triggers on
  # Istio sidecar containers which are injected by the mesh - not in our manifests.
  - CKV_K8S_25

