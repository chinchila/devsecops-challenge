framework:
  - terraform
  - kubernetes

soft-fail: false

skip-check:
  # GKE Binary Authorization
  # Justification: Requires attestor infrastructure not in scope.
  # Residual risk: R-02 in THREAT_MODEL.md. Mitigated by Cosign + Argo CD.
  - CKV_GCP_66
  # PostgreSQL Require SSL is encrypted only because of the effort for managing client
  # certificates. The data inside the pod will be encrypted because the instances are different.
  - CKV_GCP_6
  # We remove how the cluster RBAC is managed because the access to the cluster should not be given
  # the workloads should be managed by ArgoCD. Governance is out of scope
  - CKV_GCP_65
  # GKE Intranode visibility
  # Justification: ADVANCED_DATAPATH (eBPF/Cilium) provides equivalent visibility
  # without the performance overhead of intranode visibility mode.
  - CKV_GCP_61
  # Node acces must be private, we enabled it but keep the control plane exposed with strict
  # network access because we do not have a VPN + peering
  - CKV_GCP_18
  # GKE shielded nodes boot integrity monitoring on nodes
  # Justification: Already enabled via shielded_instance_config in gke/main.tf.
  # Checkov has a false positive for this check on Terraform google-beta provider.
  - CKV_GCP_68
  # This is a false positive, metadata is enabled in the node pool
  - CKV_GCP_69
  # This tells us to not use k8s secrets as env variables, we use a secrets operator
  # the risk is very low in this case and under very specific configurations
  # its different then mounting the secret as file.
  - CKV_K8S_35
  # This tells us to use digest instead of tags, if we make immutable releases
  # the tags will be immutable therefore this makes a risk documentation on R-09
  - CKV_K8S_43

skip-path:
  - k8s/security/kube-bench-job.yaml
  - k8s/security/auditd-logging-daemonset.yaml
